<!DOCTYPE html>
<html class="no-js" lang="EN">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Eliseo Murillo's portfolio is under construction. Fullstack developer crafting modern web experiences.">

    <meta property="og:title" content="Eliseo Murillo — Fullstack Developer">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://eliseo.murillo.link">
    <meta property="og:image" content="https://eliseo.murillo.link/img/favicon-96x96.png">
    <meta property="og:image:alt" content="Eliseo Murillo portfolio preview">

    <meta name="theme-color" content="#fafafa">
    <script src="./js/app.js" defer=""></script>
    <script src="https://github.com/evejweinberg/sparkleHover/blob/master/sparkleHover.js" defer=""></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&amp;family=Sora:wght@100..800&amp;display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
  </head>

  <body>
    <div class="view--layout">
      <!-- Fixed background layers -->
      <div class="view--layout__background"></div>
      <div class="view--layout__layer">
        <div class="view--layout__round  view--layout__round-1"></div>
        <div class="view--layout__round  view--layout__round-2"></div>
        <div class="view--layout__round  view--layout__round-3"></div>
      </div>

      <!-- Scrollable content -->
      <div class="view--container">
        <img src="./img/logo-em.png" alt="">
        <h2>This portfolio is under construction</h2>
        <p>Because my 2022 self wouldn't recognize the engineer I am today</p>
        <div class="console--container">
          <div class="console--header">
            <div class="console--header-actions">
              <div class="console--header-round">
                <span>x</span>
              </div>
              <div class="console--header-round">
                <span>-</span>
              </div>
              <div class="console--header-round">
                <span>x</span>
              </div>
            </div>
            <h2>eliseo-murillo@portfolio:~$</h2>
          </div>
          <div class="console--body">
          </div>
        </div>
      </div>

      <a href="https://eliseo.murillo.link" target="_blank" class="time-machine--versions-container">
        <img src="./img/V1-eliseo.png" alt="" class="portefolio-img">
        <span>Portefolio v1</span>
      </a>
      <div class="time-machine--container time-machine--container-animation">
        <img src="./img/delorian.png" alt="Delorean image as time machine" class="delorean--img">
        <img src="./img/scientific-me.png" alt="Elise as crazy scientific" class="scientific-me--img">
        <div class="time-machine--call-to-action">
          <img src="./img/arrow.png" alt="go back arrow">
          <p>Let's go back to 2021</p>
        </div>
      </div>
    </div>


  </body>

</html>
